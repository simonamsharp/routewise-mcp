name = "routewise-mcp"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Secrets — set via `wrangler secret put` or the Cloudflare dashboard:
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_ANON_KEY
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY

# KV namespace for API key cache (sha256(key) → {key_id, plan, monthly_limit, revoked}, 5-min TTL)
# Create with: wrangler kv namespace create API_KEYS
# Then replace __API_KEYS_NAMESPACE_ID__ below with the id printed by that command.
[[kv_namespaces]]
binding = "API_KEYS"
id = "__API_KEYS_NAMESPACE_ID__"

[observability]
enabled = true
